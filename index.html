<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>担当者別販売推移表 — 2025年3月</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue','Hiragino Sans','Meiryo',sans-serif; color: #333; background: #fff; padding: 28px 32px; max-width: 1000px; margin: 0 auto; }

.db-header { border-left: 4px solid #37aaba; padding-left: 12px; margin-bottom: 24px; }
.db-header h1 { font-size: 19px; font-weight: 500; color: #37aaba; }
.db-header p { font-size: 12px; color: #666; margin-top: 4px; }

.kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
.kpi-card { background: #f6f6f6; border-left: 3px solid #37aaba; border-radius: 8px; padding: 14px 16px; }
.kpi-label { font-size: 11px; color: #666; margin-bottom: 6px; }
.kpi-value { font-size: 17px; font-weight: 500; color: #333; }
.kpi-sub { font-size: 11px; color: #666; margin-top: 4px; }

.section-title { font-size: 13px; font-weight: 500; color: #37aaba; border-bottom: 1px solid #37aaba33; padding-bottom: 4px; margin-bottom: 12px; }

.chart-wrap { position: relative; width: 100%; height: 460px; margin-bottom: 8px; }
.legend { display: flex; gap: 16px; margin-bottom: 28px; font-size: 12px; color: #666; }
.legend span { display: flex; align-items: center; gap: 5px; }
.legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

.rank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
.rank-label { font-size: 11px; color: #666; margin-bottom: 6px; }
.rank-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid #ddd; font-size: 12px; color: #333; gap: 8px; }
.badge { font-size: 11px; padding: 1px 7px; border-radius: 4px; white-space: nowrap; }
.badge-up { background: #e6f7f5; color: #1a7a6e; }
.badge-dn { background: #fdecea; color: #b03025; }

table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
thead tr { background: #37aaba; color: #fff; }
th { padding: 8px 10px; font-weight: 500; text-align: left; }
th:nth-child(2), th:nth-child(3), th:nth-child(4) { text-align: right; }
td { padding: 6px 10px; border-bottom: 0.5px solid #e0e0e0; color: #333; vertical-align: middle; }
td:nth-child(2), td:nth-child(3) { text-align: right; font-variant-numeric: tabular-nums; }
td:nth-child(4) { text-align: right; }
tr:nth-child(even) td { background: #37aaba0a; }

.print-btn { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; padding: 7px 18px; border: 1.5px solid #37aaba; border-radius: 6px; color: #37aaba; background: #fff; font-size: 13px; cursor: pointer; font-family: inherit; }
.print-btn:hover { background: #37aaba; color: #fff; }

.footer { font-size: 11px; color: #ccc; text-align: right; margin-top: 20px; border-top: 0.5px solid #eee; padding-top: 10px; }

@media print {
  .print-btn { display: none !important; }
  body { padding: 0; font-size: 10px; max-width: 100%; }
  .kpi-value { font-size: 13px; }
  .kpi-sub { font-size: 9px; }
  .chart-wrap { height: 380px; }
  table { font-size: 10px; }
  th { padding: 5px 6px; }
  td { padding: 4px 6px; }
  .rank-row { font-size: 10px; }
  .section-title { margin-top: 8px; }
  @page { margin: 15mm 10mm; size: A4 portrait; }
}
</style>
</head>
<body>

<button class="print-btn" onclick="printDashboard()">&#128438;&nbsp;印刷 / PDF保存</button>

<div class="db-header">
  <h1>担当者別販売推移表</h1>
  <p>担当: 北川 侑貴 &nbsp;|&nbsp; 基準期間: 2025年3月 &nbsp;|&nbsp; 社外秘</p>
</div>

<div class="kpi-grid">
  <div class="kpi-card">
    <div class="kpi-label">今年売上合計</div>

    <div class="kpi-sub">前年比 +9.5%</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">昨年売上合計</div>
    <div class="kpi-value">¥98,411,241</div>
    <div class="kpi-sub">基準期間対比</div>
  </div>
  <div class="kpi-card">
    <div class="kpi-label">対比比率</div>

  </div>
</div>

<p class="section-title">上位10得意先 — 今年 vs 昨年</p>
<div class="chart-wrap">
  <canvas id="barChart" role="img" aria-label="上位10得意先の今年・昨年売上比較棒グラフ">上位10得意先の今年・昨年売上比較</canvas>
</div>
<div class="legend">
  <span><i style="background:#37aaba;"></i>今年</span>
  <span><i style="background:#cccccc;"></i>昨年</span>
</div>

<p class="section-title">対比比率 上位・下位（前年実績あり・今年100万円以上）</p>
<div class="rank-grid">
  <div>
    <div class="rank-label">伸長上位5社</div>
    <div id="rankUp"></div>
  </div>
  <div>
    <div class="rank-label">苦戦下位5社</div>
    <div id="rankDn"></div>
  </div>
</div>

<p class="section-title">得意先一覧（今年実績あり・売上降順）</p>
<table>
  <thead>
    <tr>
      <th style="width:40%;">得意先名</th>
      <th style="width:22%;">今年（円）</th>
      <th style="width:22%;">昨年（円）</th>
      <th style="width:16%;">対比</th>
    </tr>
  </thead>
  <tbody id="tblBody"></tbody>
</table>

<div class="footer">社外秘 — 担当者別販売推移表 2025年3月</div>

<script>
const raw = [

  {name:'（株）山星屋 関東営業部 京葉', ty:233280, ly:243810},
  {name:'（株）丸萬', ty:197220, ly:482040},
  {name:'（株）カナヅル', ty:197200, ly:129600},
  {name:'株式会社 丸井スズキ', ty:165900, ly:145200},

  {name:'合同会社 味良工房', ty:139440, ly:60720},
  {name:'（株）種清 横浜営業所', ty:134596, ly:176944},
  {name:'ニッポー(株)', ty:117600, ly:122600},
  {name:'（株）種清 静岡流通センター', ty:111360, ly:184568},
  {name:'（株）種清 野洲物流センター', ty:102720, ly:114768},
  {name:'（株）種清 北関東物流センター', ty:99240, ly:91908},

  {name:'(株)川辰商店', ty:56025, ly:39000},
  {name:'株式会社 はなまた', ty:53280, ly:15000},
  {name:'（株）山星屋 埼玉オフィス', ty:49200, ly:29400},
  {name:'（株）種清 北陸流通センター', ty:43350, ly:29400},
  {name:'綜合食品 株式会社', ty:42000, ly:17000},
  {name:'（株）種清 平和堂久御山DC', ty:36000, ly:54000},
  {name:'(株)テレビ朝日ビジネスプロデュー', ty:33600, ly:30400},
  {name:'（株）山星屋 本社営業部', ty:22500, ly:123000},
  {name:'(株)不二ビューティ商品部', ty:21600, ly:21600},
  {name:'(株)アリスタ・木曽', ty:19500, ly:0},
  {name:'（株）大藤（原料）', ty:16500, ly:0},
  {name:'(株)山星屋 請求書', ty:-5529, ly:-19335},
  {name:'（株）種清 中部流通センター', ty:-30626, ly:-27329},
];

Chart.register(ChartDataLabels);

const jpy = v => v.toLocaleString('ja-JP');

const top10 = raw.filter(d => d.ty > 0).sort((a,b) => b.ty - a.ty).slice(0,10);

new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: top10.map(d => d.name.length > 10 ? d.name.slice(0,10)+'…' : d.name),
    datasets: [
      { label:'今年', data: top10.map(d => d.ty), backgroundColor:'#37aaba' },
      { label:'昨年', data: top10.map(d => d.ly > 0 ? d.ly : 0), backgroundColor:'#cccccc' }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding: { bottom: 30 } },
    plugins: {
      legend: { display: false },
      datalabels: {
        display: (ctx) => ctx.datasetIndex === 0,
        anchor: 'end',
        align: 'end',
        formatter: v => v > 0 ? Math.round(v/10000).toLocaleString('ja-JP')+"万" : '',
        font: { size: 9 },
        color: '#333',
        
        offset: 2
      }
    },
    scales: {
      x: {
        ticks: { autoSkip: false, maxRotation: 60, minRotation: 60, font:{size:10}, color:'#666' },
        grid: { display: false }
      },
      y: {
        ticks: {
          callback: v => '¥' + Math.round(v/10000).toLocaleString('ja-JP') + '万',
          font:{size:10}, color:'#666'
        },
        grid: { color:'#cccccc44' },
        grace: '20%'
      }
    }
  }
});

const withRatio = raw.filter(d => d.ty >= 1000000 && d.ly > 0);
const sorted = [...withRatio].sort((a,b) => (b.ty/b.ly) - (a.ty/a.ly));
const topUp = sorted.slice(0,5);
const topDn = sorted.slice(-5).reverse();

function makeRank(items, isUp) {
  return items.map(d => {
    const r = parseFloat((d.ty / d.ly * 100).toFixed(1)).toLocaleString('ja-JP', {minimumFractionDigits:1, maximumFractionDigits:1});
    const nm = d.name.length > 16 ? d.name.slice(0,16)+'…' : d.name;
    const cls = isUp ? 'badge-up' : 'badge-dn';
    return `<div class="rank-row"><span>${nm}</span><span class="badge ${cls}">${r}%</span></div>`;
  }).join('');
}
document.getElementById('rankUp').innerHTML = makeRank(topUp, true);
document.getElementById('rankDn').innerHTML = makeRank(topDn, false);

const upNames = new Set(topUp.map(d => d.name));
const dnNames = new Set(topDn.map(d => d.name));

const tbody = document.getElementById('tblBody');
raw.filter(d => d.ty > 0).sort((a,b) => b.ty - a.ty).forEach(d => {
  const hasRatio = d.ly !== 0;
  const ratioNum = hasRatio ? d.ty / d.ly * 100 : null;
  const ratio = ratioNum !== null ? parseFloat(ratioNum.toFixed(1)).toLocaleString('ja-JP', {minimumFractionDigits:1, maximumFractionDigits:1}) : null;
  const cls = ratioNum !== null ? (ratioNum >= 100 ? 'badge-up' : 'badge-dn') : '';
  const ratioBadge = ratio
    ? `<span class="badge ${cls}">${ratio}%</span>`
    : '<span style="color:#ccc;">—</span>';
  const lyStr = d.ly > 0 ? jpy(d.ly) : (d.ly < 0 ? '-'+jpy(Math.abs(d.ly)) : '—');
  const tyStr = d.ty > 0 ? jpy(d.ty) : '-'+jpy(Math.abs(d.ty));
  const isUp = upNames.has(d.name);
  const isDn = dnNames.has(d.name);
  const nameStyle = isUp
    ? 'color:#0f6e8a; font-weight:500;'
    : isDn ? 'color:#b03025; font-weight:500;' : '';
  const tr = document.createElement('tr');
  tr.innerHTML = `<td style="${nameStyle}">${d.name}</td><td>${tyStr}</td><td style="color:#666;">${lyStr}</td><td>${ratioBadge}</td>`;
  tbody.appendChild(tr);
});

let barChartRef;
document.addEventListener('DOMContentLoaded', () => {
  barChartRef = Chart.getChart('barChart');
});

function printDashboard() {
  const chart = Chart.getChart('barChart');
  if (chart) {
    chart.options.scales.x.ticks.maxRotation = 90;
    chart.options.scales.x.ticks.minRotation = 90;
    chart.options.layout.padding.bottom = 60;
    chart.update();
  }
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      if (chart) {
        chart.options.scales.x.ticks.maxRotation = 60;
        chart.options.scales.x.ticks.minRotation = 60;
        chart.options.layout.padding.bottom = 30;
        chart.update();
      }
    }, 1000);
  }, 400);
}
</script>
</body>
</html>
